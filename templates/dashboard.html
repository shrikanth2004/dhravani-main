<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dhravani - Dashboard</title>

  <!-- Google Sans Font -->
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f7f9fc;
      font-family: 'Google Sans', sans-serif;
      margin: 0;
      padding: 0;
    }

    .header {
      position: absolute;
      top: 20px;
      left: 15px;
    }

    .header h4 {
      color: #1a73e8;
      font-size: 24px;
      font-weight: 500;
      margin: 0;
    }

    .container {
      max-width: 900px;
      margin: 100px auto 0;
      padding: 20px;
      text-align: center;
    }

    .dashboard h2 {
      font-weight: 600;
      font-size: 2rem;
      margin-bottom: 40px;
    }

    .card-wrapper {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 30px;
    }

    .option-card {
      width: 320px;
      padding: 30px 25px;
      border-radius: 20px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
      text-align: center;
      background-color: white;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 260px;
      transition: transform 0.2s ease;
    }

    .option-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.1);
    }

    .option-card h3 {
      margin-bottom: 15px;
      font-weight: 500;
    }

    .option-card p {
      color: #555;
      font-size: 0.95rem;
      margin-bottom: auto;
    }

    .btn-option {
      width: 100%;
      padding: 10px 0;
      font-weight: 500;
      font-size: 1rem;
      border-radius: 8px;
      margin-top: 20px;
      transition: background-color 0.2s ease, transform 0.2s ease;
    }

    .btn-option:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    @media (max-width: 768px) {
      .card-wrapper {
        flex-direction: column;
        align-items: center;
      }

      .header {
        position: static;
        text-align: center;
        margin-bottom: 20px;
      }
    }
  </style>
</head>
<body>

  <!-- Top-left heading -->
  <div class="header">
    <h4 class="mb-0">COILD Dhravani</h4>
  </div>

  <!-- Main content -->
  <div class="container">
    <div class="dashboard">
      <h2>Welcome to Dhravani</h2>
      <div class="card-wrapper">
        <div class="option-card">
          <h3>Dhravani Recorder 🎙️</h3>
          <p>Record your voice for speech corpus creation.</p>
          <a href="{{ url_for('recorder') }}" class="btn btn-primary btn-option">Start Recorder</a>
        </div>
        <div class="option-card">
          <h3>Dhravani Transcriber 📝</h3>
          <p>Transcribe existing audio using models.</p>
          <a href="{{ url_for('transcriber_page') }}" class="btn btn-dark btn-option">Start Transcriber</a>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
